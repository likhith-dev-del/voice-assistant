<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to RIA - Your Futuristic AI Assistant</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- Lottie Player -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <!-- Vanta.js and Three.js for background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

  <!-- Typed.js -->
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
      overflow: hidden;
    }
    #vanta-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      color: #00ffe0;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 15px;
    }
    .typed-text {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #ddd;
    }
    .language-selector {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lang-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #0ff;
      color: #0ff;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .lang-btn:hover {
      background: #0ff;
      color: #000;
      transform: scale(1.05);
    }
    .proceed-btn {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(to right, #0ff, #00f2fe);
      color: #000;
      font-weight: bold;
      box-shadow: 0 0 20px #00ffff70;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .proceed-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #00ffff;
    }
    .lottie-container {
      margin-top: 40px;
      width: 320px;
      height: 320px;
    }
    .audio-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid #0ff;
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px #0ff;
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>

  <div class="container">
    <h1><span id="typed"></span></h1>
    <div class="typed-text">Select your preferred language to continue</div>

    <div class="language-selector">
      <button class="lang-btn" data-lang="en-US">🇺🇸 English</button>
      <button class="lang-btn" data-lang="hi-IN">🇮🇳 Hindi</button>
      <button class="lang-btn" data-lang="te-IN">🇮🇳 Telugu</button>
      <button class="lang-btn" data-lang="ta-IN">🇮🇳 Tamil</button>
      <button class="lang-btn" data-lang="fr-FR">🇫🇷 French</button>
      <button class="lang-btn" data-lang="de-DE">🇩🇪 German</button>
    </div>

    <button class="proceed-btn" onclick="proceedToHome()">Proceed →</button>

    <div class="lottie-container">
      <lottie-player
        src="https://assets4.lottiefiles.com/packages/lf20_tll0j4bb.json"
        background="transparent"
        speed="1"
        loop
        autoplay>
      </lottie-player>
    </div>
  </div>

  <div class="audio-toggle" onclick="toggleAudio()">🔊</div>

  <audio id="ambientAudio" loop autoplay muted>
    <source src="https://assets.mixkit.co/music/preview/mixkit-spaceship-alarm-998.mp3" type="audio/mp3">
  </audio>

  <script>
    let selectedLang = null;

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedLang = btn.getAttribute('data-lang');
        localStorage.setItem('language', selectedLang);
        document.querySelectorAll('.lang-btn').forEach(b => b.style.background = 'rgba(255,255,255,0.1)');
        btn.style.background = '#0ff';
        btn.style.color = '#000';
      });
    });

    function proceedToHome() {
      if (!selectedLang) {
        alert('Please select a language before proceeding.');
        return;
      }
      window.location.href = 'home.html';
    }

    function toggleAudio() {
      const audio = document.getElementById('ambientAudio');
      audio.muted = !audio.muted;
    }

    new Typed('#typed', {
      strings: ['Wakeup word is RIA'],
      typeSpeed: 70,
      backSpeed: 40,
      loop: true
    });

    VANTA.WAVES({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x0ff,
      shininess: 40.00,
      waveHeight: 15.00,
      waveSpeed: 0.5,
      zoom: 0.85
    });
  </script>
</body>
</html>
