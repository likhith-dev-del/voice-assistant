<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RIA – Chat & Input History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Inter font for modern, readable typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons for UI elements -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0F0F0F;
            color: #F1F1F1;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #121212;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 64px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #F1F1F1;
            user-select: none;
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #F1F1F1;
            flex: 1;
            text-align: center;
            margin-left: -64px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header-actions button {
            background: none;
            border: none;
            color: #A1A1AA;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .header-actions button:hover,
        .header-actions button:focus {
            background: rgba(34,211,238,0.08);
            color: #22D3EE;
            outline: none;
        }
        main {
            display: flex;
            flex: 1 1 auto;
            min-height: 0;
            height: 0;
            background: #0F0F0F;
        }
        nav.history-tabs {
            width: 72px;
            background: #121212;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 18px;
            gap: 18px;
        }
        nav.history-tabs button {
            background: none;
            border: none;
            color: #A1A1AA;
            font-size: 1.6rem;
            padding: 14px 0;
            border-radius: 10px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
            margin-bottom: 6px;
        }
        nav.history-tabs button.active,
        nav.history-tabs button:hover,
        nav.history-tabs button:focus {
            background: #212121;
            color: #22D3EE;
            outline: none;
        }
        .history-content {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            background: #121212;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }
        .history-section {
            display: none;
            flex-direction: row;
            height: 100%;
            min-height: 0;
        }
        .history-section.active {
            display: flex;
        }
        /* Chat List (left panel) */
        .chat-list, .voice-list, .image-list {
            width: 320px;
            min-width: 240px;
            max-width: 100vw;
            background: #121212;
            border-right: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        .chat-list ul,
        .voice-list ul,
        .image-list ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .chat-list li, .voice-list li, .image-list li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: background 0.18s, border-color 0.18s;
            background: none;
            outline: none;
        }
        .chat-list li:hover, .voice-list li:hover, .image-list li:hover,
        .chat-list li:focus, .voice-list li:focus, .image-list li:focus {
            background: #1E1E1E;
            border-left: 4px solid #6366F1;
        }
        .chat-list li.active, .voice-list li.active, .image-list li.active {
            background: #2A2A2A;
            border-left: 4px solid #22D3EE;
        }
        .avatar, .voice-icon, .image-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2A2A2A;
            color: #6366F1;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            flex-shrink: 0;
            object-fit: cover;
        }
        .voice-icon {
            background: #1E1E1E;
            color: #22D3EE;
            font-size: 1.4rem;
        }
        .image-thumb {
            border-radius: 8px;
            background: #222;
        }
        .chat-info, .voice-info, .image-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-title, .voice-title, .image-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #F1F1F1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-snippet, .voice-snippet, .image-snippet {
            font-size: 0.97rem;
            color: #A1A1AA;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-time, .voice-time, .image-time {
            font-size: 0.88rem;
            color: #A1A1AA;
            margin-left: 8px;
            flex-shrink: 0;
        }
        /* Chat/Voice/Image View (right panel) */
        .chat-view, .voice-view, .image-view {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            background: #121212;
            padding: 2.5rem 3rem 1.5rem 3rem;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }
        .messages, .voice-history, .image-history {
            flex: 1 1 auto;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 80px;
        }
        /* Day divider */
        .day-divider {
            text-align: center;
            font-size: 0.93rem;
            color: #A1A1AA;
            margin: 28px 0 10px 0;
            position: relative;
            letter-spacing: 0.03em;
        }
        .day-divider::before, .day-divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: rgba(255,255,255,0.05);
        }
        .day-divider::before { left: 0; }
        .day-divider::after { right: 0; }
        /* Chat bubbles */
        .message {
            max-width: 72%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 1.08rem;
            line-height: 1.6;
            position: relative;
            word-break: break-word;
            transition: background 0.15s;
            box-sizing: border-box;
            margin-bottom: 2px;
            display: flex;
            flex-direction: column;
        }
        .message.user {
            align-self: flex-end;
            background: #1E1E1E;
            color: #F1F1F1;
            border-bottom-right-radius: 6px;
            border-top-right-radius: 18px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #2A2A2A;
            color: #F1F1F1;
            border-bottom-left-radius: 6px;
            border-top-left-radius: 18px;
        }
        .message .timestamp {
            font-size: 0.88rem;
            color: #A1A1AA;
            margin-top: 6px;
            text-align: right;
            user-select: none;
            align-self: flex-end;
        }
        /* Typing animation for assistant */
        .message.assistant.typing::after {
            content: '';
            display: inline-block;
            width: 1.2em;
            height: 1em;
            vertical-align: middle;
            background: url('data:image/svg+xml;utf8,<svg width="36" height="12" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="6" r="6" fill="%23A1A1AA"/><circle cx="18" cy="6" r="6" fill="%23A1A1AA"/><circle cx="30" cy="6" r="6" fill="%23A1A1AA"/></svg>') no-repeat center/contain;
            animation: typing-bounce 1.2s infinite steps(3);
            margin-left: 8px;
        }
        @keyframes typing-bounce {
            0%   { opacity: 1; }
            33%  { opacity: 0.5; }
            66%  { opacity: 1; }
        }
        /* Voice Input History */
        .voice-entry {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            background: #181818;
            border-radius: 12px;
            padding: 18px 22px;
            margin-bottom: 10px;
        }
        .voice-entry .voice-icon {
            width: 36px;
            height: 36px;
            background: #222;
            color: #22D3EE;
            font-size: 1.3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-entry .voice-meta {
            flex: 1;
        }
        .voice-entry .voice-text {
            font-size: 1.07rem;
            color: #F1F1F1;
            margin-bottom: 4px;
        }
        .voice-entry .voice-time {
            font-size: 0.93rem;
            color: #A1A1AA;
        }
        .voice-entry .waveform {
            margin-top: 8px;
            height: 22px;
            width: 120px;
            background: linear-gradient(90deg, #6366F1 0%, #22D3EE 100%);
            border-radius: 8px;
            opacity: 0.2;
        }
        /* Image Search History */
        .image-entry {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            background: #181818;
            border-radius: 12px;
            padding: 18px 22px;
            margin-bottom: 10px;
        }
        .image-entry .image-thumb {
            width: 56px;
            height: 56px;
            background: #222;
            object-fit: cover;
            border-radius: 8px;
        }
        .image-entry .image-meta {
            flex: 1;
        }
        .image-entry .image-title {
            font-size: 1.07rem;
            color: #F1F1F1;
            margin-bottom: 4px;
        }
        .image-entry .image-time {
            font-size: 0.93rem;
            color: #A1A1AA;
        }
        .image-entry .image-query {
            color: #A1A1AA;
            font-size: 0.98rem;
            margin-top: 2px;
        }
        /* Floating mic button */
        .chat-view > button, .voice-view > button, .image-view > button {
            position: fixed;
            bottom: 32px;
            right: 36px;
            background-color: #22D3EE;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0F0F0F;
            font-size: 24px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: none;
            z-index: 10;
        }
        .chat-view > button:hover,
        .voice-view > button:hover,
        .image-view > button:hover,
        .chat-view > button:focus,
        .voice-view > button:focus,
        .image-view > button:focus {
            background-color: #6366F1;
            outline: none;
        }
        /* Footer */
        footer {
            background: #0A0A0A;
            color: #F1F1F1;
            border-top: 1px solid rgba(255,255,255,0.10);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1rem;
            min-height: 56px;
        }
        footer .fw-bold {
            font-weight: 700;
            font-size: 1.08rem;
        }
        footer nav ul {
            display: flex;
            gap: 1.8rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        footer nav a {
            color: #A1A1AA;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.15s;
        }
        footer nav a:hover,
        footer nav a:focus {
            color: #22D3EE;
            outline: none;
        }
        footer .text-muted {
            color: #A1A1AA !important;
            font-size: 0.97rem;
        }
        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 10px;
            background: #181818;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 6px;
        }
        /* Responsive */
        @media (max-width: 991.98px) {
            main {
                flex-direction: column;
                height: auto;
            }
            nav.history-tabs {
                flex-direction: row;
                width: 100vw;
                height: 64px;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.05);
                justify-content: center;
                align-items: flex-end;
                padding: 0 0 8px 0;
            }
            .chat-list, .voice-list, .image-list {
                width: 100vw;
                height: 220px;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            .history-section {
                flex-direction: column;
            }
            .chat-view, .voice-view, .image-view {
                padding: 1.5rem 1rem 1.5rem 1rem;
                height: calc(100vh - 340px);
            }
            .chat-view > button, .voice-view > button, .image-view > button {
                right: 16px;
                bottom: 16px;
            }
        }
        @media (max-width: 600px) {
            header, footer {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .chat-view, .voice-view, .image-view {
                padding: 1rem 0.5rem 1rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" aria-label="RIA logo">RIA</div>
        <div class="page-title">History</div>
        <div class="header-actions">
            <button aria-label="Search history"><i class="bi bi-search"></i></button>
        </div>
    </header>
    <main>
        <nav class="history-tabs" aria-label="History Type Tabs">
            <button class="active" aria-label="Chat History" id="tab-chat"><i class="bi bi-chat-dots"></i></button>
            <button aria-label="Voice Input History" id="tab-voice"><i class="bi bi-mic"></i></button>
            <button aria-label="Image Search History" id="tab-image"><i class="bi bi-image"></i></button>
        </nav>
        <div class="history-content">
            <!-- Chat History Section -->
            <div class="history-section active" id="section-chat">
                <aside class="chat-list" aria-label="Chat list">
                    <ul role="list" aria-label="Chat list">
                        <!-- Chat list items dynamically inserted here -->
                    </ul>
                </aside>
                <section class="chat-view" tabindex="0" aria-label="Chat view">
                    <div class="messages" aria-live="polite">
                        <!-- Messages dynamically inserted here -->
                    </div>
                    <button aria-label="Start voice input">
                        <i class="bi bi-mic-fill"></i>
                    </button>
                </section>
            </div>
            <!-- Voice Input History Section -->
            <div class="history-section" id="section-voice">
                <aside class="voice-list" aria-label="Voice Input list">
                    <ul role="list" aria-label="Voice Input list">
                        <!-- Voice input list items dynamically inserted here -->
                    </ul>
                </aside>
                <section class="voice-view" tabindex="0" aria-label="Voice input detail">
                    <div class="voice-history" aria-live="polite">
                        <!-- Voice input detail dynamically inserted here -->
                    </div>
                    <button aria-label="Record new voice input">
                        <i class="bi bi-mic-fill"></i>
                    </button>
                </section>
            </div>
            <!-- Image Search History Section -->
            <div class="history-section" id="section-image">
                <aside class="image-list" aria-label="Image Search list">
                    <ul role="list" aria-label="Image Search list">
                        <!-- Image search list items dynamically inserted here -->
                    </ul>
                </aside>
                <section class="image-view" tabindex="0" aria-label="Image search detail">
                    <div class="image-history" aria-live="polite">
                        <!-- Image search detail dynamically inserted here -->
                    </div>
                    <button aria-label="Upload/search new image">
                        <i class="bi bi-image"></i>
                    </button>
                </section>
            </div>
        </div>
    </main>
    <footer>
        <div class="fw-bold">RIA</div>
        <nav aria-label="Footer quick links">
            <ul>
                <li><a href="#">Terms</a></li>
                <li><a href="#">Privacy</a></li>
                <li><a href="#">Help</a></li>
            </ul>
        </nav>
        <div class="text-muted">v1.0.0</div>
    </footer>
    <script>
    // --- Demo Data ---
    const chats = [
        {
            id: 1,
            title: "Translate to Spanish",
            lastMessage: "Can you translate 'Hello' to Spanish?",
            lastTime: "Jun 17, 10:00 PM",
            messages: [
                { sender: "user", text: "Can you translate 'Hello' to Spanish?", timestamp: "10:00 PM" },
                { sender: "assistant", text: "Sure! 'Hello' in Spanish is 'Hola'.", timestamp: "10:01 PM" }
            ]
        },
        {
            id: 2,
            title: "Set Reminder",
            lastMessage: "Remind me to call John tomorrow.",
            lastTime: "Jun 16, 9:30 AM",
            messages: [
                { sender: "user", text: "Remind me to call John tomorrow.", timestamp: "9:30 AM" },
                { sender: "assistant", text: "Reminder set for tomorrow at 9 AM.", timestamp: "9:31 AM" }
            ]
        }
    ];
    const voiceInputs = [
        {
            id: 1,
            title: "Voice Note: Shopping List",
            snippet: "Add milk, eggs, and bread",
            time: "Jun 17, 8:45 PM",
            transcript: "Add milk, eggs, and bread",
            duration: "0:07",
            waveform: true
        },
        {
            id: 2,
            title: "Voice Command: Weather",
            snippet: "What's the weather in Vizag?",
            time: "Jun 16, 7:10 AM",
            transcript: "What's the weather in Vizag?",
            duration: "0:03",
            waveform: true
        }
    ];
    const imageSearches = [
        {
            id: 1,
            title: "Image Search: Landmark",
            snippet: "Uploaded photo of Eiffel Tower",
            time: "Jun 15, 2:03 PM",
            query: "What is this building?",
            image: "https://images.unsplash.com/photo-1464983953574-0892a716854b?auto=format&fit=crop&w=200&q=80"
        },
        {
            id: 2,
            title: "Image Search: Menu",
            snippet: "Uploaded restaurant menu",
            time: "Jun 14, 6:20 PM",
            query: "Translate this menu to English",
            image: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=200&q=80"
        }
    ];

    // --- Tab Switching Logic ---
    const tabButtons = {
        chat: document.getElementById('tab-chat'),
        voice: document.getElementById('tab-voice'),
        image: document.getElementById('tab-image')
    };
    const sections = {
        chat: document.getElementById('section-chat'),
        voice: document.getElementById('section-voice'),
        image: document.getElementById('section-image')
    };
    Object.keys(tabButtons).forEach(key => {
        tabButtons[key].addEventListener('click', () => {
            Object.keys(tabButtons).forEach(k => {
                tabButtons[k].classList.toggle('active', k === key);
                sections[k].classList.toggle('active', k === key);
            });
        });
    });

    // --- Chat List Rendering ---
    const chatListElement = document.querySelector('.chat-list ul');
    const messagesContainer = document.querySelector('.messages');

    function renderChatList() {
        chatListElement.innerHTML = '';
        chats.forEach(chat => {
            const li = document.createElement('li');
            li.tabIndex = 0;
            li.setAttribute('role', 'listitem');
            li.dataset.chatId = chat.id;
            li.classList.add('chat-item');

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = chat.title.charAt(0).toUpperCase();

            const chatInfo = document.createElement('div');
            chatInfo.className = 'chat-info';

            const title = document.createElement('div');
            title.className = 'chat-title';
            title.textContent = chat.title;

            const snippet = document.createElement('div');
            snippet.className = 'chat-snippet';
            snippet.textContent = chat.lastMessage;

            chatInfo.appendChild(title);
            chatInfo.appendChild(snippet);

            const time = document.createElement('div');
            time.className = 'chat-time';
            time.textContent = chat.lastTime;

            li.appendChild(avatar);
            li.appendChild(chatInfo);
            li.appendChild(time);

            li.addEventListener('click', () => setActiveChat(chat.id));
            chatListElement.appendChild(li);
        });
    }

    function setActiveChat(chatId) {
        document.querySelectorAll('.chat-list li').forEach(li => li.classList.remove('active'));
        const selectedLi = document.querySelector(`.chat-list li[data-chat-id="${chatId}"]`);
        if (selectedLi) selectedLi.classList.add('active');
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        messagesContainer.innerHTML = '';
        const dayDivider = document.createElement('div');
        dayDivider.className = 'day-divider';
        dayDivider.textContent = 'Today';
        messagesContainer.appendChild(dayDivider);
        chat.messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.sender}`;
            msgDiv.setAttribute('tabindex', '0');
            const textDiv = document.createElement('div');
            textDiv.textContent = msg.text;
            msgDiv.appendChild(textDiv);
            const timeDiv = document.createElement('div');
            timeDiv.className = 'timestamp';
            timeDiv.textContent = msg.timestamp;
            msgDiv.appendChild(timeDiv);
            messagesContainer.appendChild(msgDiv);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // --- Voice Input List Rendering ---
    const voiceListElement = document.querySelector('.voice-list ul');
    const voiceHistoryContainer = document.querySelector('.voice-history');

    function renderVoiceList() {
        voiceListElement.innerHTML = '';
        voiceInputs.forEach(v => {
            const li = document.createElement('li');
            li.tabIndex = 0;
            li.setAttribute('role', 'listitem');
            li.dataset.voiceId = v.id;
            li.classList.add('voice-item');
            const icon = document.createElement('div');
            icon.className = 'voice-icon';
            icon.innerHTML = '<i class="bi bi-mic"></i>';
            const info = document.createElement('div');
            info.className = 'voice-info';
            const title = document.createElement('div');
            title.className = 'voice-title';
            title.textContent = v.title;
            const snippet = document.createElement('div');
            snippet.className = 'voice-snippet';
            snippet.textContent = v.snippet;
            info.appendChild(title);
            info.appendChild(snippet);
            const time = document.createElement('div');
            time.className = 'voice-time';
            time.textContent = v.time;
            li.appendChild(icon);
            li.appendChild(info);
            li.appendChild(time);
            li.addEventListener('click', () => setActiveVoice(v.id));
            voiceListElement.appendChild(li);
        });
    }

    function setActiveVoice(voiceId) {
        document.querySelectorAll('.voice-list li').forEach(li => li.classList.remove('active'));
        const selectedLi = document.querySelector(`.voice-list li[data-voice-id="${voiceId}"]`);
        if (selectedLi) selectedLi.classList.add('active');
        const v = voiceInputs.find(x => x.id === voiceId);
        if (!v) return;
        voiceHistoryContainer.innerHTML = '';
        const dayDivider = document.createElement('div');
        dayDivider.className = 'day-divider';
        dayDivider.textContent = 'Today';
        voiceHistoryContainer.appendChild(dayDivider);

        const entry = document.createElement('div');
        entry.className = 'voice-entry';
        const icon = document.createElement('div');
        icon.className = 'voice-icon';
        icon.innerHTML = '<i class="bi bi-mic"></i>';
        const meta = document.createElement('div');
        meta.className = 'voice-meta';
        const text = document.createElement('div');
        text.className = 'voice-text';
        text.textContent = v.transcript;
        const time = document.createElement('div');
        time.className = 'voice-time';
        time.textContent = `Duration: ${v.duration} • ${v.time}`;
        meta.appendChild(text);
        meta.appendChild(time);
        if (v.waveform) {
            const waveform = document.createElement('div');
            waveform.className = 'waveform';
            meta.appendChild(waveform);
        }
        entry.appendChild(icon);
        entry.appendChild(meta);
        voiceHistoryContainer.appendChild(entry);
    }

    // --- Image Search List Rendering ---
    const imageListElement = document.querySelector('.image-list ul');
    const imageHistoryContainer = document.querySelector('.image-history');

    function renderImageList() {
        imageListElement.innerHTML = '';
        imageSearches.forEach(img => {
            const li = document.createElement('li');
            li.tabIndex = 0;
            li.setAttribute('role', 'listitem');
            li.dataset.imageId = img.id;
            li.classList.add('image-item');
            const thumb = document.createElement('img');
            thumb.className = 'image-thumb';
            thumb.src = img.image;
            thumb.alt = img.title;
            const info = document.createElement('div');
            info.className = 'image-info';
            const title = document.createElement('div');
            title.className = 'image-title';
            title.textContent = img.title;
            const snippet = document.createElement('div');
            snippet.className = 'image-snippet';
            snippet.textContent = img.snippet;
            info.appendChild(title);
            info.appendChild(snippet);
            const time = document.createElement('div');
            time.className = 'image-time';
            time.textContent = img.time;
            li.appendChild(thumb);
            li.appendChild(info);
            li.appendChild(time);
            li.addEventListener('click', () => setActiveImage(img.id));
            imageListElement.appendChild(li);
        });
    }

    function setActiveImage(imageId) {
        document.querySelectorAll('.image-list li').forEach(li => li.classList.remove('active'));
        const selectedLi = document.querySelector(`.image-list li[data-image-id="${imageId}"]`);
        if (selectedLi) selectedLi.classList.add('active');
        const img = imageSearches.find(x => x.id === imageId);
        if (!img) return;
        imageHistoryContainer.innerHTML = '';
        const dayDivider = document.createElement('div');
        dayDivider.className = 'day-divider';
        dayDivider.textContent = 'Today';
        imageHistoryContainer.appendChild(dayDivider);

        const entry = document.createElement('div');
        entry.className = 'image-entry';
        const thumb = document.createElement('img');
        thumb.className = 'image-thumb';
        thumb.src = img.image;
        thumb.alt = img.title;
        const meta = document.createElement('div');
        meta.className = 'image-meta';
        const title = document.createElement('div');
        title.className = 'image-title';
        title.textContent = img.title;
        const query = document.createElement('div');
        query.className = 'image-query';
        query.textContent = img.query;
        const time = document.createElement('div');
        time.className = 'image-time';
        time.textContent = img.time;
        meta.appendChild(title);
        meta.appendChild(query);
        meta.appendChild(time);
        entry.appendChild(thumb);
        entry.appendChild(meta);
        imageHistoryContainer.appendChild(entry);
    }

    // --- Initial Render ---
    renderChatList();
    setActiveChat(chats[0].id);
    renderVoiceList();
    setActiveVoice(voiceInputs[0].id);
    renderImageList();
    setActiveImage(imageSearches[0].id);

    // --- Accessibility: Keyboard navigation for chat/voice/image list
    document.querySelectorAll('.chat-list ul, .voice-list ul, .image-list ul').forEach(list => {
        list.addEventListener('keydown', (e) => {
            const focusableItems = Array.from(list.querySelectorAll('li'));
            const currentIndex = focusableItems.indexOf(document.activeElement);
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                const nextIndex = (currentIndex + 1) % focusableItems.length;
                focusableItems[nextIndex].focus();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prevIndex = (currentIndex - 1 + focusableItems.length) % focusableItems.length;
                focusableItems[prevIndex].focus();
            }
        });
    });
    // Focus styles for list items
    const style = document.createElement('style');
    style.textContent = `
        .chat-list li:focus, .voice-list li:focus, .image-list li:focus {
            outline: 2px solid #22D3EE;
            outline-offset: -2px;
            background-color: #1E1E1E;
        }
    `;
    document.head.appendChild(style);

    // --- Floating mic/image buttons (demo only) ---
    document.querySelectorAll('.chat-view > button, .voice-view > button, .image-view > button').forEach(btn => {
        btn.addEventListener('click', () => {
            alert('Voice/image input triggered (placeholder)');
        });
    });
    </script>
</body>
</html>
