    <style>
        body {
            background-color: black;
            overflow-y: hidden;
            overflow-x: hidden;
        }

        /* OVAL GLOW ANIMATION */
        .square {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .square span:nth-child(1) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#00ffc000 50%, #06ffe23b 40%);
            box-shadow: 0 0 50px #00e0c6, inset 0 0 50px #00e0c6;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate1 6s linear infinite;
        }

        .square span:nth-child(2) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#ff00c000 50%, #fd10e13b 40%);
            box-shadow: 0 0 50px #f317d9, inset 0 0 50px #f927e0;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate2 4s linear infinite;
        }

        .square span:nth-child(3) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#00aaff06 50%, #00e1ff3b 40%);
            box-shadow: 0 0 50px #00ddff, inset 0 0 50px #00fbff;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate3 8s linear infinite;
        }

        @keyframes animate1 {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes animate2 {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes animate3 {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* HEADING */
        h5 {
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin-top: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00e0c6, 0 0 20px #f317d9, 0 0 30px #00ddff;
            font-weight: bold;
            letter-spacing: 1px;
            transition: color 0.3s ease-in-out;
            cursor: pointer;
        }

        /* INPUT FIELD SECTION */
        #TextInput {
            background-color: #181818a8;
            border-color: rgb(0, 251, 255);
            box-shadow: 0 0 20px rgb(0, 247, 255), inset 0 0 0px rgb(0, 98, 255);
            border-radius: 18px;
            color: white;
            padding: 3px 0px 3px 20px;
            margin: 0px 20%;
        }

        .input-field {
            background-color: transparent;
            border: none;
            width: 95%;
            outline: none;
            color: white;
            font-family: cursive;
        }

        .glow-on-hover {
            width: 35px;
            height: 35px;
            border: none;
            outline: none;
            color: #fff;
            background: #111;
            cursor: pointer;
            position: relative;
            z-index: 0;
            border-radius: 10px;
            padding: 0px;
            margin-left: 10px;
        }
        .glow-on-hover:before {
            content: '';
            background: linear-gradient(45deg, #00ff8c, #00bbff, #fffb00, #9500ff, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            position: absolute;
            top: -2px;
            left: -2px;
            background-size: 400%;
            z-index: -1;
            filter: blur(5px);
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            animation: glowing 20s linear infinite;
            opacity: 0;
            transition: opacity .3s ease-in-out;
            border-radius: 10px;
        }
        .glow-on-hover:active { color: #181818a8 }
        .glow-on-hover:active:after { background: transparent; }
        .glow-on-hover:hover:before { opacity: 1; }
        .glow-on-hover:after {
            z-index: -1;
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111;
            left: 0;
            top: 0;
            border-radius: 10px;
        }
        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        /* CHAT OFFCANVAS */
        .chat-canvas {
            background-color: #191919;
        }

        .receiver_message {
            padding: 8px;
            border: 2px solid cyan;
            border-radius: 0px 15px 15px 20px;
            width: auto;
            color: white;
            background-color: #0dcaf014;
        }

        .sender_message {
            padding: 8px;
            border: 1px solid #0045ff;
            border-radius: 15px 15px 0px 20px;
            width: auto;
            color: white;
            background-color: #0045ff;
        }

        .width-size {
            max-width: 80%;
            width: auto;
        }
    </style>

    <!-- PARTICLE SPHERE SCRIPT -->
    <script>
        // Particle Sphere (from paste.txt)[1]
        window.addEventListener("load", windowLoadHandler, false);
        var sphereRad = 140;
        var radius_sp = 1;
        var Debugger = function () { };
        Debugger.log = function (message) {
            try { console.log(message); } catch (exception) { return; }
        }

        function windowLoadHandler() {
            canvasApp();
        }

        function canvasSupport() {
            return Modernizr.canvas;
        }

        function canvasApp() {
            if (!canvasSupport()) return;

            var theCanvas = document.getElementById("canvasOne");
            var context = theCanvas.getContext("2d");
            var displayWidth, displayHeight, timer, wait, count, numToAddEachFrame;
            var particleList, recycleBin, particleAlpha, r, g, b, fLen, m, projCenterX, projCenterY, zMax, turnAngle, turnSpeed;
            var sphereCenterX, sphereCenterY, sphereCenterZ, particleRad, zeroAlphaDepth, randAccelX, randAccelY, randAccelZ, gravity, rgbString;
            var p, outsideTest, nextParticle, sinAngle, cosAngle, rotX, rotZ, depthAlphaFactor, i, theta, phi, x0, y0, z0;

            init();

            function init() {
                wait = 1;
                count = wait - 1;
                numToAddEachFrame = 8;
                r = 0; g = 72; b = 255;
                rgbString = "rgba(" + r + "," + g + "," + b + ",";
                particleAlpha = 1;
                displayWidth = theCanvas.width;
                displayHeight = theCanvas.height;
                fLen = 320;
                projCenterX = displayWidth / 2;
                projCenterY = displayHeight / 2;
                zMax = fLen - 2;
                particleList = {};
                recycleBin = {};
                randAccelX = 0.1;
                randAccelY = 0.1;
                randAccelZ = 0.1;
                gravity = -0;
                particleRad = 1.8;
                sphereCenterX = 0;
                sphereCenterY = 0;
                sphereCenterZ = -3 - sphereRad;
                zeroAlphaDepth = -750;
                turnSpeed = 2 * Math.PI / 1200;
                turnAngle = 0;
                timer = setInterval(onTimer, 10 / 24);
            }

            function onTimer() {
                count++;
                if (count >= wait) {
                    count = 0;
                    for (i = 0; i < numToAddEachFrame; i++) {
                        theta = Math.random() * 2 * Math.PI;
                        phi = Math.acos(Math.random() * 2 - 1);
                        x0 = sphereRad * Math.sin(phi) * Math.cos(theta);
                        y0 = sphereRad * Math.sin(phi) * Math.sin(theta);
                        z0 = sphereRad * Math.cos(phi);
                        var p = addParticle(x0, sphereCenterY + y0, sphereCenterZ + z0, 0.002 * x0, 0.002 * y0, 0.002 * z0);
                        p.attack = 50;
                        p.hold = 50;
                        p.decay = 100;
                        p.initValue = 0;
                        p.holdValue = particleAlpha;
                        p.lastValue = 0;
                        p.stuckTime = 90 + Math.random() * 20;
                        p.accelX = 0;
                        p.accelY = gravity;
                        p.accelZ = 0;
                    }
                }
                turnAngle = (turnAngle + turnSpeed) % (2 * Math.PI);
                sinAngle = Math.sin(turnAngle);
                cosAngle = Math.cos(turnAngle);
                context.fillStyle = "#000000";
                context.fillRect(0, 0, displayWidth, displayHeight);
                p = particleList.first;
                while (p != null) {
                    nextParticle = p.next;
                    p.age++;
                    if (p.age > p.stuckTime) {
                        p.velX += p.accelX + randAccelX * (Math.random() * 2 - 1);
                        p.velY += p.accelY + randAccelY * (Math.random() * 2 - 1);
                        p.velZ += p.accelZ + randAccelZ * (Math.random() * 2 - 1);
                        p.x += p.velX;
                        p.y += p.velY;
                        p.z += p.velZ;
                    }
                    rotX = cosAngle * p.x + sinAngle * (p.z - sphereCenterZ);
                    rotZ = -sinAngle * p.x + cosAngle * (p.z - sphereCenterZ) + sphereCenterZ;
                    m = radius_sp * fLen / (fLen - rotZ);
                    p.projX = rotX * m + projCenterX;
                    p.projY = p.y * m + projCenterY;
                    if (p.age < p.attack + p.hold + p.decay) {
                        if (p.age < p.attack) {
                            p.alpha = (p.holdValue - p.initValue) / p.attack * p.age + p.initValue;
                        }
                        else if (p.age < p.attack + p.hold) {
                            p.alpha = p.holdValue;
                        }
                        else if (p.age < p.attack + p.hold + p.decay) {
                            p.alpha = (p.lastValue - p.holdValue) / p.decay * (p.age - p.attack - p.hold) + p.holdValue;
                        }
                    }
                    else {
                        p.dead = true;
                    }
                    if ((p.projX > displayWidth) || (p.projX < 0) || (p.projY < 0) || (p.projY > displayHeight) || (rotZ > zMax)) {
                        outsideTest = true;
                    }
                    else {
                        outsideTest = false;
                    }
                    if (outsideTest || p.dead) {
                        recycle(p);
                    }
                    else {
                        depthAlphaFactor = (1 - rotZ / zeroAlphaDepth);
                        depthAlphaFactor = (depthAlphaFactor > 1) ? 1 : ((depthAlphaFactor < 0) ? 0 : depthAlphaFactor);
                        context.fillStyle = rgbString + depthAlphaFactor * p.alpha + ")";
                        context.beginPath();
                        context.arc(p.projX, p.projY, m * particleRad, 0, 2 * Math.PI, false);
                        context.closePath();
                        context.fill();
                    }
                    p = nextParticle;
                }
            }

            function addParticle(x0, y0, z0, vx0, vy0, vz0) {
                var newParticle;
                if (recycleBin.first != null) {
                    newParticle = recycleBin.first;
                    if (newParticle.next != null) {
                        recycleBin.first = newParticle.next;
                        newParticle.next.prev = null;
                    }
                    else {
                        recycleBin.first = null;
                    }
                }
                else {
                    newParticle = {};
                }
                if (particleList.first == null) {
                    particleList.first = newParticle;
                    newParticle.prev = null;
                    newParticle.next = null;
                }
                else {
                    newParticle.next = particleList.first;
                    particleList.first.prev = newParticle;
                    particleList.first = newParticle;
                    newParticle.prev = null;
                }
                newParticle.x = x0;
                newParticle.y = y0;
                newParticle.z = z0;
                newParticle.velX = vx0;
                newParticle.velY = vy0;
                newParticle.velZ = vz0;
                newParticle.age = 0;
                newParticle.dead = false;
                if (Math.random() < 0.5) {
                    newParticle.right = true;
                }
                else {
                    newParticle.right = false;
                }
                return newParticle;
            }

            function recycle(p) {
                if (particleList.first == p) {
                    if (p.next != null) {
                        p.next.prev = null;
                        particleList.first = p.next;
                    }
                    else {
                        particleList.first = null;
                    }
                }
                else {
                    if (p.next == null) {
                        p.prev.next = null;
                    }
                    else {
                        p.prev.next = p.next;
                        p.next.prev = p.prev;
                    }
                }
                if (recycleBin.first == null) {
                    recycleBin.first = p;
                    p.prev = null;
                    p.next = null;
                }
                else {
                    p.next = recycleBin.first;
                    recycleBin.first.prev = p;
                    recycleBin.first = p;
                    p.prev = null;
                }
            }
        }
    </script>



    <!-- Main JS for chat and UI logic -->
    <script>


async function PlayAssistant(message) {

    // Show user message
    $("#chat-canvas-body").append(`
        <div class="d-flex justify-content-end mb-2">
            <div class="sender_message width-size">
                ${message}
            </div>
        </div>
    `);

    try {

        const response = await fetch('/speak', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                text: message,
                language: "english"
            })
        });

        const data = await response.json();

        // Show AI response
        $("#chat-canvas-body").append(`
            <div class="d-flex justify-content-start mb-2">
                <div class="receiver_message width-size">
                    ${data.response}
                </div>
            </div>
        `);

        // Auto scroll chat
        $("#chat-canvas-body").scrollTop(
            $("#chat-canvas-body")[0].scrollHeight
        );

        // Play voice
        const audio = new Audio(data.audio);

        audio.play();

    } catch (error) {

        console.error(error);

        alert("Assistant Error");

    }
}

        // Text animation for greeting and assistant name
        $(document).ready(function () {
            $('.text').textillate({
                loop: true,
                sync: true,
                in: { effect: "bounceIn" },
                out: { effect: "bounceOut" }
            });

            // Toggle mic/send button based on input
            function ShowHideButton(message) {
                if (message.length === 0) {
                    $("#MicBtn").attr('hidden', false);
                    $("#SendBtn").attr('hidden', true);
                } else {
                    $("#MicBtn").attr('hidden', true);
                    $("#SendBtn").attr('hidden', false);
                }
            }

            // Input events
            $("#chatbox").keyup(function () {
                let message = $("#chatbox").val();
                ShowHideButton(message);
            });

            $("#SendBtn").click(function () {
                let message = $("#chatbox").val();
                 PlayAssistant(message); // Placeholder for backend call
                $("#chatbox").val("");
                ShowHideButton("");
            });

            $("#chatbox").keypress(function (e) {
                if (e.which === 13) {
                    let message = $("#chatbox").val();
                     PlayAssistant(message); // Placeholder for backend call
                    $("#chatbox").val("");
                    ShowHideButton("");
                }
            });

            // Optionally, focus input on load for better UX
            $("#chatbox").focus();
        });
    </script>
